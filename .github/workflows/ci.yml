# Synapse CI - fast deterministic checks on every push / PR to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check app tests

      - name: Format check
        run: uv run ruff format --check app tests

      - name: Tests
        run: uv run pytest --cov=app --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.14

      - name: Install backend dependencies
        run: cd ../backend && uv sync --all-extras

      - name: Verify generated API files are committed
        run: npm run api:check

  docker:
    name: Docker build (${{ matrix.service }})
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=min,scope=${{ matrix.service }}
