# Agent evals - LLM-as-judge. Slow, expensive, non-deterministic.
# Manual trigger only. Run before releasing a new agent version.
name: Agent Evals

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to eval (scout / scribe / critic / all)'
        required: false
        default: 'all'
      judge_model:
        description: 'OpenRouter model id for the LLM judge (empty = harness default openai/gpt-5.1)'
        required: false
        default: ''
      scout_models:
        description: 'Comma-separated Scout candidate models (empty = harness default)'
        required: false
        default: ''
      scribe_models:
        description: 'Comma-separated Scribe candidate models (empty = harness default)'
        required: false
        default: ''
      critic_models:
        description: 'Comma-separated Critic candidate models (empty = harness default)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  agent-evals:
    runs-on: ubuntu-latest
    environment: evals
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run evals
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          EVAL_JUDGE_MODEL: ${{ github.event.inputs.judge_model }}
          EVAL_SCOUT_MODELS: ${{ github.event.inputs.scout_models }}
          EVAL_SCRIBE_MODELS: ${{ github.event.inputs.scribe_models }}
          EVAL_CRITIC_MODELS: ${{ github.event.inputs.critic_models }}
        run: |
          AGENT="${{ github.event.inputs.agent }}"
          if [ "$AGENT" = "all" ] || [ -z "$AGENT" ]; then
            uv run pytest tests/evals/ -m agent_eval -s
          else
            uv run pytest tests/evals/ -m agent_eval -k "$AGENT" -s
          fi

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: backend/tests/evals/results/
          if-no-files-found: ignore
